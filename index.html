<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-White Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <input type="text" class="calculator-screen" id="screen" disabled />
    <div class="calculator-keys">
        <button type="button" class="operator" onclick="clearScreen()">AC</button>
        <button type="button" class="operator" onclick="deleteLast()">DEL</button>
        <button type="button" class="operator" onclick="appendToScreen('/')">/</button>
        <button type="button" class="operator" onclick="appendToScreen('*')">×</button>

        <button type="button" onclick="appendToScreen('7')">7</button>
        <button type="button" onclick="appendToScreen('8')">8</button>
        <button type="button" onclick="appendToScreen('9')">9</button>
        <button type="button" class="operator" onclick="appendToScreen('-')">-</button>

        <button type="button" onclick="appendToScreen('4')">4</button>
        <button type="button" onclick="appendToScreen('5')">5</button>
        <button type="button" onclick="appendToScreen('6')">6</button>
        <button type="button" class="operator" onclick="appendToScreen('+')">+</button>

        <button type="button" onclick="appendToScreen('1')">1</button>
        <button type="button" onclick="appendToScreen('2')">2</button>
        <button type="button" onclick="appendToScreen('3')">3</button>
        <button type="button" class="equal-sign" onclick="calculate()">=</button>

        <button type="button" class="zero-btn" onclick="appendToScreen('0')">0</button>
        <button type="button" onclick="appendToScreen('.')">.</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
